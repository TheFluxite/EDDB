name: Build Data

on:
  push:
    paths:
      - 'data/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Generate _data.json
        run: node build_data.js

      - name: Commit and push _data.json
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add data/_data.json
          git diff --cached --quiet || git commit -m 'chore: rebuild _data.json'
          git push origin main
